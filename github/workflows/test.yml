name: HapifyMe API E2E Automation

# Declanșator: Pipeline-ul pornește automat la fiecare Push sau Pull Request pe branch-ul main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-e2e-tests:
    # Rulăm pe o mașină virtuală curată cu Linux (Ubuntu) oferită de GitHub
    runs-on: ubuntu-latest

    steps:
      # 1. Descărcăm codul din repository în mașina virtuală
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configurăm JDK 21 (versiunea pe care ai dezvoltat codul)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Salvează dependențele în cache pentru rulări ulterioare mai rapide

      # 3. Executăm suita de teste folosind Maven
      # Parametrul -B (Batch mode) reduce log-urile inutile în consolă
      - name: Execute E2E Tests with Maven
        run: mvn -B test --file pom.xml

      # 4. Salvarea rapoartelor de testare ca Artefacte
      # Folosim condiția "if: always()" pentru ca acest pas să ruleze chiar dacă testele pică.
      # Este esențial în QA să putem descărca rapoartele mai ales atunci când avem eșecuri!
      - name: Upload Test Execution Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hapifyme-e2e-test-results
          path: target/surefire-reports/